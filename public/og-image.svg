<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0D1B3E"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Center logo group -->
  <g transform="translate(410, 160)">
    <!-- B icon -->
    <rect width="140" height="140" rx="24" fill="#1D9E75" fill-opacity="0.1" stroke="#1D9E75" stroke-width="1.5"/>
    <path d="M34 26 L34 114 L82 114 C102 114 118 100 118 82 C118 72 114 64 106 58 C112 53 116 45 116 36 C116 28 108 26 82 26 Z
             M50 40 L80 40 C88 40 94 46 94 52 C94 58 88 64 80 64 L50 64 Z
             M50 80 L82 80 C92 80 96 86 96 92 C96 98 92 104 82 104 L50 104 Z" fill="white"/>
    <polygon points="78,34 62,68 74,68 58,106 94,62 80,62 92,34" fill="#1D9E75"/>
    <polyline points="10,124 26,124 32,110 40,138 48,118 56,124 130,124" stroke="#1D9E75" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="600" y="250" font-family="'Poppins', Arial, sans-serif" font-weight="700" font-size="64" letter-spacing="6" fill="white" text-anchor="middle">BLITORA</text>
  <text x="600" y="330" font-family="'Poppins', Arial, sans-serif" font-weight="700" font-size="64" letter-spacing="6" fill="#1D9E75" text-anchor="middle">PULSE</text>
  <text x="600" y="390" font-family="'Poppins', Arial, sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle">Health Made Intelligent.</text>
  <!-- Accent line -->
  <line x1="200" y1="430" x2="1000" y2="430" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.3"/>
  <text x="600" y="470" font-family="'Poppins', Arial, sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">pulse.blitora.com</text>
</svg>